services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datainsight-backend
    ports:
      - "8000:8000"
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.moonshot.cn/v1}
      LLM_MODEL: ${LLM_MODEL:-kimi2.5}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datainsight-frontend
    depends_on:
      - backend
    ports:
      - "5174:80"
    restart: unless-stopped
